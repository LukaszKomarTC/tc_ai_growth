name: CI

on:
  push:
    branches: ["claude/**", "main"]
  pull_request:

jobs:
  orchestrator:
    name: Orchestrator (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test (guardrails + portability + runtime)
        run: pytest -q

  connector:
    name: WordPress connector (php -l)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
      - name: Lint plugin PHP
        run: |
          set -e
          find wordpress-plugin/tc-growth-connector -name '*.php' -print0 \
            | xargs -0 -n1 php -l
